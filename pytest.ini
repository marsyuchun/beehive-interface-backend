[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --tb=short
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s | %(levelname)s | %(name)s | %(message)s
log_cli_date_format = %H:%M:%S
markers =
    smoke: 核心冒烟测试
    regression: 完整回归测试
    platform: API Pilot 数据库表单用例
